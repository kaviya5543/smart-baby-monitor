<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Baby Monitoring System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container fade-in">
        <header>
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="header-icon">
                    <path d="M9 12h.01" />
                    <path d="M15 12h.01" />
                    <path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5" />
                    <path d="M22 12c0 5.5-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2s10 4.5 10 10Z" />
                </svg>
            </div>
            <h1>Smart Baby Monitoring System</h1>
            <p class="subtitle">Real-time monitoring for your peace of mind</p>
        </header>

        <main class="home-main">
            <div class="card-grid">
                <a href="baby.html" class="nav-card primary-card hover-lift">
                    <div class="card-image-container">
                        <img src="https://img.freepik.com/free-vector/cute-baby-sleeping-cloud-pillow-cartoon-icon-illustration_138676-2812.jpg?semt=ais_hybrid&w=740&q=80"
                            alt="Baby Monitor" class="card-image float-animation">
                    </div>
                    <h2>Baby Monitor</h2>
                    <p>Place this device near the baby to start monitoring video and audio.</p>
                    <span class="btn-text">Open Monitor &rarr;</span>
                </a>

                <a href="mother.html" class="nav-card secondary-card hover-lift">
                    <div class="card-image-container">
                        <img src="assets/mother.png" alt="Mother Dashboard" class="card-image float-animation-delayed">
                    </div>
                    <h2>Mother Dashboard</h2>
                    <p>Track alerts and view monitoring history from anywhere.</p>
                    <span class="btn-text">Open Dashboard &rarr;</span>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
